<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kelabit Dictionary</title></head><body>
<div id="kelabit-dictionary" class="kd-shell">
  <div class="kd-heading"><h2>Kelabit Dictionary</h2><p>Kelabit ↔ English</p></div>
  <label class="kd-search"><span aria-hidden="true">⌕</span><input id="kd-query" type="search" autocomplete="off" placeholder="Search a Kelabit or English word" aria-label="Search the Kelabit dictionary"><button id="kd-clear" type="button">Clear</button></label>
  <div class="kd-directions" role="group" aria-label="Search direction"><button class="is-active" type="button" data-kd-mode="both">Both directions</button><button type="button" data-kd-mode="kelabit">Kelabit → English</button><button type="button" data-kd-mode="english">English → Kelabit</button></div>
  <p id="kd-status" class="kd-status">Start typing to search the dictionary.</p>
  <section id="kd-results" class="kd-results" aria-live="polite"></section><div id="kd-more-wrap" class="kd-more-wrap" hidden><button id="kd-more" type="button">See more results</button></div>
  <p class="kd-credit">Source: <em>Kelabit-Lun Tauh Dictionary</em>, Mutang Urud (Murud), 2023.</p>
</div>
<style>
  #kelabit-dictionary{--kd-ink:#18352e;--kd-green:#176c59;--kd-pale:#e9f4ed;--kd-line:#d3e4da;--kd-muted:#627b74;max-width:880px;margin:0 auto;padding:20px 14px 32px;color:var(--kd-ink);font:16px/1.52 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  #kelabit-dictionary *{box-sizing:border-box}#kelabit-dictionary h2{margin:0;font-size:1.7rem;line-height:1.2;color:var(--kd-ink)}.kd-heading p{margin:3px 0 18px;color:var(--kd-muted)}
  .kd-search{display:flex;align-items:center;gap:8px;padding:7px 8px 7px 13px;background:#fff;border:1px solid var(--kd-line);border-radius:14px;box-shadow:0 2px 10px rgba(20,60,45,.06)}.kd-search:focus-within{border-color:var(--kd-green);box-shadow:0 0 0 3px rgba(23,108,89,.14)}.kd-search span{font-size:1.35rem;line-height:1}.kd-search input{flex:1;min-width:0;border:0;outline:0;background:transparent;color:var(--kd-ink);font:inherit;padding:7px 0}.kd-search button{border:0;border-radius:8px;background:var(--kd-pale);color:var(--kd-ink);font:inherit;padding:8px 11px;cursor:pointer}.kd-search button:hover{background:#d6ecdf}
  .kd-directions{display:flex;gap:8px;overflow:auto;padding:14px 0 5px}.kd-directions button{white-space:nowrap;border:1px solid var(--kd-line);border-radius:999px;padding:7px 12px;background:#fff;color:var(--kd-ink);font:inherit;cursor:pointer}.kd-directions button.is-active{background:var(--kd-green);border-color:var(--kd-green);color:#fff}.kd-status{min-height:1.5em;margin:7px 2px 10px;color:var(--kd-muted);font-size:.91rem}.kd-search{position:sticky;top:0;z-index:10}.kd-results{display:grid;gap:10px;max-height:35rem;overflow-y:auto;padding-right:4px;scrollbar-width:thin}.kd-more-wrap{text-align:center;margin-top:12px}.kd-more-wrap button{border:1px solid var(--kd-line);border-radius:999px;background:var(--kd-pale);color:var(--kd-ink);font:inherit;padding:9px 15px;cursor:pointer}.kd-more-wrap button:hover{background:#d6ecdf}.kd-related-word,.kd-kelabit-word{border:0;background:transparent;color:var(--kd-green);font:inherit;padding:0;cursor:pointer;text-decoration:none}.kd-related-word:hover,.kd-kelabit-word:hover{color:#0d4b3d}.kd-example-label,.kd-description-label{display:block;margin-bottom:2px;color:var(--kd-muted);font-size:.78rem;font-weight:650;letter-spacing:.02em;opacity:.78}.kd-example-english{display:block;margin-top:5px;color:#42645a}.kd-entry{background:#fff;border:1px solid var(--kd-line);border-radius:12px;padding:14px 15px}.kd-word{color:#105947;font-size:1.1rem;font-weight:750}.kd-pos{margin-left:8px;color:var(--kd-muted);font-size:.85rem;font-weight:500}.kd-definition{margin-top:5px}.kd-example{margin:9px 0 0;padding-left:11px;border-left:3px solid var(--kd-line);color:#42645a;font-size:.94rem}.kd-related{margin-top:9px;color:var(--kd-muted);font-size:.86rem}.kd-related b{color:#42645a}.kd-page{margin-top:9px;color:var(--kd-muted);font-size:.78rem}.kd-empty{padding:26px 10px;text-align:center;color:var(--kd-muted)}.kd-credit{margin:17px 2px 0;color:var(--kd-muted);font-size:.82rem}#kelabit-dictionary mark{background:#ffed98;border-radius:2px;padding:0 1px}@media(max-width:480px){#kelabit-dictionary{padding:16px 10px 26px}.kd-heading h2{font-size:1.45rem}.kd-entry{padding:12px}.kd-search button{padding:8px}.kd-directions{padding-top:12px}}
</style>
<script>
(async () => {
  const DATA = await fetch('data.json').then(response => { if (!response.ok) throw new Error('Dictionary data could not load.'); return response.json(); });
  const root=document.querySelector('#kelabit-dictionary'), input=root.querySelector('#kd-query'), results=root.querySelector('#kd-results'), status=root.querySelector('#kd-status');
  let mode='both', visibleCount=10;
  const normalise=value=>String(value||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[’‘]/g,"'").toLowerCase().replace(/\s+/g,' ').trim();
  const escapeHtml=value=>String(value||'').replace(/[&<>"]/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const highlight=(value,query)=>{const text=escapeHtml(value);if(!query)return text;const safe=escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp('('+safe+')','ig'),'<mark>$1</mark>')};
  const relatedLinks=items=>items.map(item=>`<button type="button" class="kd-related-word" data-kd-word="${escapeHtml(item)}">${escapeHtml(item)}</button>`).join(', ');const escapeRegExp=value=>value.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const headwordExpression=[...new Set(DATA.map(entry=>entry.word))].sort((a,b)=>b.length-a.length).map(word=>escapeRegExp(word).replace(/[’']/g,"[’']")).join('|');const headwordPattern=new RegExp(`(^|[^\\p{L}])(${headwordExpression})(?=$|[^\\p{L}])`,'giu');const kelabitLinks=value=>{const text=String(value||'');let output='',last=0;text.replace(headwordPattern,(match,prefix,word,offset)=>{const start=offset+prefix.length;output+=escapeHtml(text.slice(last,start));output+=`<button type="button" class="kd-kelabit-word" data-kd-word="${escapeHtml(word)}">${escapeHtml(word)}</button>`;last=start+word.length;return match});return output+escapeHtml(text.slice(last))};const withoutPartOfSpeech=value=>String(value||'').replace(/\b(?:n|v|adj|adv|pron|prep|conj|interj|excl|ij|phr\.n|phr\.v|v\.n|id\.exp|abbr|num|art|det|aux|part|sl|colloq)\.\s*/gi,'').replace(/^\s*\d+\.\s*/,'').replace(/\s{2,}/g,' ').trim();const englishLead=/^(?:a|an|the|i|you|he|she|it|we|they|this|that|these|those|here|there|for|to|in|on|at|with|without|when|why|how|what|who|where|all|my|your|his|her|our|their|is|are|was|were|do|does|did|can|could|will|would|should|may|must|please|not|yes|no|damn|oh|suddenly|immediately|from|as|if|after|before|during)\b/i;const splitExample=value=>{const text=String(value||'').replace(/^\([a-z]\)\s*/i,'').trim(),parts=text.split(/,\s*/);const index=parts.findIndex((part,i)=>i>0&&englishLead.test(part.trim()));return index>0?{kelabit:parts.slice(0,index).join(', '),english:parts.slice(index).join(', ')}:{kelabit:text,english:''}};const renderExamples=examples=>examples.map((example,index)=>{const parts=splitExample(example),label=examples.length>1?`Example ${index+1}:`:'Example:';return `<div class="kd-example"><span class="kd-example-label">${label}</span>${kelabitLinks(parts.kelabit)}${parts.english?`<span class="kd-example-english">${escapeHtml(parts.english)}</span>`:''}</div>`}).join('');const fieldScore=(field,query)=>{if(!field)return 0;if(field===query)return 10000;if(field.startsWith(query))return 5000;if(field.includes(query))return 1300;const parts=query.split(' ');return parts.every(part=>field.split(' ').some(token=>token.startsWith(part)))?600:0};
  function find(query){const q=normalise(query);if(!q)return[];const found=[];for(const entry of DATA){const word=normalise(entry.word),definition=normalise(entry.definition),examples=normalise((entry.examples||[]).join(' ')),related=normalise((entry.related_words||[]).join(' '));const kelabit=word.includes(q),english=definition.includes(q)||examples.includes(q);if((mode==='kelabit'&&!kelabit)||(mode==='english'&&!english)||(mode==='both'&&!kelabit&&!english))continue;const score=fieldScore(word,q)+fieldScore(definition,q)*.82+fieldScore(examples,q)*.32+fieldScore(related,q)*.42-word.length/1000;found.push({entry,score})}return found.sort((a,b)=>b.score-a.score||a.entry.word.localeCompare(b.entry.word))}
  function render(){const typed=input.value.trim(),found=find(typed);if(!typed){results.innerHTML='';status.textContent='Start typing to search the dictionary.';return}const shown=found.slice(0,visibleCount), moreWrap=root.querySelector('#kd-more-wrap');status.textContent=`${found.length.toLocaleString()} match${found.length===1?'':'es'}${found.length>visibleCount?` — showing ${visibleCount} so far`:''}.`;moreWrap.hidden=found.length<=visibleCount;results.innerHTML=shown.length?shown.map(({entry})=>`<article class="kd-entry"><div class="kd-word">${highlight(entry.word,typed)}${entry.part_of_speech.length?`<span class="kd-pos">${escapeHtml(entry.part_of_speech.join(', '))}</span>`:''}</div><div class="kd-definition"><span class="kd-description-label">Description:</span>${kelabitLinks(withoutPartOfSpeech(entry.definition))}</div>${entry.examples.length?renderExamples(entry.examples):''}${entry.related_words.length?`<div class="kd-related"><b>See also:</b> ${relatedLinks(entry.related_words)}</div>`:''}</article>`).join(''):'<div class="kd-empty">No match yet. Try a shorter word or a different spelling.</div>'}
  input.addEventListener('input',()=>{visibleCount=10;render()});root.querySelector('#kd-clear').addEventListener('click',()=>{input.value='';visibleCount=10;input.focus();render()});root.querySelector('#kd-more').addEventListener('click',()=>{visibleCount+=10;render()});results.addEventListener('click',event=>{const button=event.target.closest('[data-kd-word]');if(!button)return;input.value=button.dataset.kdWord;mode='kelabit';visibleCount=10;root.querySelectorAll('[data-kd-mode]').forEach(item=>item.classList.toggle('is-active',item.dataset.kdMode==='kelabit'));render()});root.querySelectorAll('[data-kd-mode]').forEach(button=>button.addEventListener('click',()=>{mode=button.dataset.kdMode;visibleCount=10;root.querySelectorAll('[data-kd-mode]').forEach(item=>item.classList.toggle('is-active',item===button));render()}));
})();
</script>
</body></html>
